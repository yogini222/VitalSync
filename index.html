<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VitalSync</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="logo">
<span class="logo-icon">✚</span>
<span class="logo-text">VitalSync</span>
</div>

<h2 class="title">
Welcome. Please select how you are accessing VitalSync.
</h2>


<div class="cards">

<!-- STAFF CARD -->

<div class="card staff">

<div class="icon">🩺</div>

<h3>Log in as Hospital Staff</h3>

<a href="login.html">
<button class="staff-btn">Log in as Staff</button>
</a>

<p class="desc">
Continue with existing Staff ID or G-Suite credentials.
</p>

</div>


<!-- PATIENT CARD -->

<div class="card patient">

<div class="icon">🧑‍⚕️</div>

<h3>Log in as a Patient</h3>

<a href="login.html">
<button class="patient-btn">Log in as Patient</button>
</a>

<p class="desc">
Check your care status or resource availability.
</p>

</div>

</div>

</div>

</body>
</html>
